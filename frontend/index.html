<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>H.E.R.M.E.S. Login</title>
    <link rel="stylesheet" type="text/css" href="styles.css">
</head>
<body>
    <div class="container" style="max-width: 400px; margin-top: 100px;">
        <h1>H.E.R.M.E.S.</h1>
        <p class="subtitle">Login to access the dashboard</p>
        
        <form id="loginForm">
            <div style="margin-bottom: 15px;">
                <label style="display: block; margin-bottom: 5px; font-weight: bold;">Username</label>
                <input type="text" id="username" required 
                    style="width: 100%; padding: 10px; border: 1px solid #e5e7eb; border-radius: 8px; box-sizing: border-box;">
            </div>
            <div style="margin-bottom: 20px;">
                <label style="display: block; margin-bottom: 5px; font-weight: bold;">Password</label>
                <input type="password" id="password" required 
                    style="width: 100%; padding: 10px; border: 1px solid #e5e7eb; border-radius: 8px; box-sizing: border-box;">
            </div>
            <p id="error-msg" style="color: #ef4444; display: none; margin-bottom: 10px;"></p>
            <button type="submit" 
                style="width: 100%; padding: 12px; background-color: #10b981; color: white; border: none; border-radius: 8px; font-size: 1rem; cursor: pointer; font-weight: bold;">
                Login
            </button>
        </form>
    </div>

    <script>
        if (localStorage.getItem("token")) {
            window.location.href = "/display.html";
        }

        document.getElementById("loginForm").addEventListener("submit", async function(e) {
            e.preventDefault();

            const username = document.getElementById("username").value;
            const password = document.getElementById("password").value;
            const errorMsg = document.getElementById("error-msg");

            try {
                const res = await fetch("/api/login", {
                    method: "POST",
                    headers: { "Content-Type": "application/x-www-form-urlencoded" },
                    body: `username=${encodeURIComponent(username)}&password=${encodeURIComponent(password)}`
                });

                if (!res.ok) {
                    errorMsg.textContent = "Incorrect username or password";
                    errorMsg.style.display = "block";
                    return;
                }

                const data = await res.json();
                localStorage.setItem("token", data.access_token);
                window.location.href = "/display.html";
            } catch (error) {
                errorMsg.textContent = "Unable to connect to server";
                errorMsg.style.display = "block";
            }
        });
    </script>
</body>
</html>
